apiVersion: apps/v1
kind: Deployment
metadata: { name: document-verification-service }
spec:
  replicas: 1
  selector: { matchLabels: { app: document-verification-service } }
  template:
    metadata: { labels: { app: document-verification-service } }
    spec:
      containers:
        - name: document-verification-service
          image: document-verification-service:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8083 }]
          env:
            - { name: EUREKA_URL, value: "http://service-registry:8761/eureka/" }
            - { name: RABBIT_HOST, value: "rabbitmq" }
            - { name: REDIS_HOST, value: "redis" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8083 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: document-verification-service }
spec:
  selector: { app: document-verification-service }
  ports: [{ port: 8083, targetPort: 8083 }]
