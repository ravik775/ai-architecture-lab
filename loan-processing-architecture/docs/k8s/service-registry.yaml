apiVersion: apps/v1
kind: Deployment
metadata: { name: service-registry }
spec:
  replicas: 1
  selector: { matchLabels: { app: service-registry } }
  template:
    metadata: { labels: { app: service-registry } }
    spec:
      containers:
        - name: service-registry
          image: service-registry:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8761 }]
          env:
            - { name: EUREKA_URL, value: "http://service-registry:8761/eureka/" }
            - { name: RABBIT_HOST, value: "rabbitmq" }
            - { name: REDIS_HOST, value: "redis" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8761 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: service-registry }
spec:
  selector: { app: service-registry }
  ports: [{ port: 8761, targetPort: 8761 }]
